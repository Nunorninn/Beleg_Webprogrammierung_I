<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
    <div id="Back">
      <button id="btn-back" onclick="goBack()">&#8592;</button>
    </div>
  <title>Lernprogramm</title>
  <link rel="stylesheet" href="css/progress.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>

</head>
<body>

  <div id="app">
    <img src="data/HTW.png" alt="Logo" style="width: 100px; height: auto;">

    <h1>Lernprogramm</h1>
    <div id="category-selection">
      <input type="button" id="mathe" value="Mathematik">
      <input type="button" id="informatik" value="Informatik">
      <input type="button" id="web" value="Web">
      <input type="button" id="musik" value="Musik">
    </div>

    <div id="quiz" style="display: none;">
    
      <p id="question">Inhalt</p>
      <div id="vexflow" style="display: none;"></div>
      <div id="answers">
        <button id="ans1" ></button>
        <button id="ans2" ></button>
        <button id="ans3" ></button>
        <button id="ans4" ></button>
      </div>
    </div>

    <div id="progress"  style="display: none;">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="result" style="display: none;"></div>

  </div>
  <script src="js/progressbar.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
