<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
    <div id="Back">
      <button id="btn-back" onclick="goBack()">&#8592;</button>
    </div>
  <title>Lernprogramm</title>
  <link rel="stylesheet" href="css/progress.css">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <div id="app">
    <img src="data/HTW.png" alt="Logo" style="width: 100px; height: auto;">

    <h1>Lernprogramm</h1>
    <div id="category-selection">
      <input type="button" id="mathe" value="Mathematik">
      <input type="button" id="informatik" value="Informatik">
      <input type="button" id="web" value="Web">
      <input type="button" id="deutsch" value="Deutsch">
    </div>

    <div id="quiz" style="display: none;">
    
      <p id="question">Inhalt</p>
      <div id="answers">
      <input type="button" id="answer1" value="Antwort 1">
      <input type="button" id="answer2" value="Antwort 2">
      <input type="button" id="answer3" value="Antwort 3">
      <input type="button" id="answer4" value="Antwort 4">
      </div>
    </div>

    <div id="progress"  style="display: none;">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="result" style="display: none;"></div>

  </div>
  <script src="js/progressbar.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
