<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lernprogramm</title>
   <link rel="manifest" type='image/png' href="manifest.json">
 <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">
    <h1>Lernprogramm</h1>
    <img src="data/HTW.png" alt="Logo" style="width: 100px; height: auto;">
    <div id="category-selection">
      <input type="button" id="mathe" value="Mathematik">
      <input type="button" id="informatik" value="Informatik">
      <input type="button" id="web" value="Web">
      <input type="button" id="deutsch" value="Deutsch">
    </div>

    <div id="quiz" style="display: none;">
      
      <p id="question"></p>


      <div id="answers"></div>
    </div>

    <div id="progress">
      <div id="bar"></div>
    </div>

    <div id="result"></div>
  </div>
   <script src="js/app.js"></script>
</body>
</html>
